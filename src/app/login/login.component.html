<div class="login-container">

  <form (ngSubmit)="login()">

    <h2>Connexion</h2>

    <div *ngIf="message" class="message">
      {{ message }}
    </div>

    <input
      type="email"
      [(ngModel)]="email"
      name="email"
      placeholder="Email"
      required
    />

    <input
      type="password"
      [(ngModel)]="mot_de_passe"
      name="mot_de_passe"
      placeholder="Mot de passe"
      required
    />

    <button type="submit">Se connecter</button>

  </form>

</div>
